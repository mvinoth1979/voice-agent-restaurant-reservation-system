name: Backend Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run edge case tests
        run: npm run test-edgecases

      - name: Run eval tests
        run: npm run test-evals

      - name: Run guardrail tests
        run: npm run test-guardrails

      - name: Build backend
        run: npm run build
